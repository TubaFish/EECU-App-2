<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <title>EECU Budget Calculator</title>
</head>
<body>
    <nav class="nav-bar">
        <img src="images/Logo.png.png" alt="EECU Logo">
    <div id="progress-1"> 
                <a href="index.html" class="page1">1</a><p></p>
                
    </div>
    <p>Choose Career</p>
    <div id="progress-2">
                <a href="tax.html" class="page2">2</a><p></p>
    </div>
    <p>Tax Breakdown</p>
    <div id="progress-3">
                <a href="budget.html" class="page3">3</a><p></p>
    </div>
    <p>Monthly Budget</p>
    <div id="progress-4">
                <a href="results.html" class="page4">4</a><p></p>
    </div>
    <p>results</p>

</nav> 

    <main>
        <h1>Choose your career path</h1>
        <h2>Select a career to view salary data.</h2>
        <form id="search-bar">
            <input id="search-careers" type="text" placeholder="Search careers... (Nurse, Developer, Teacher)">
        </form>
        <section id="career-selection">
            <button class="career">
                <p>Software Developer</p><br><p>$85,000.00/yr</p>
            </button>
            <button class="career">
                <p>Biologist</p><br><p>$88,000.00/yr</p>
            </button>
            <button class="career">
                <p>Chemist</p><br><p>$58,808.00/yr</p>
            </button>
            <button class="career">
                <p>Lawyer</p><br><p>$93,000.00/yr</p>
            </button>
            <button class="career">
                <p>Nurse</p><br><p>$82,000.00/yr</p>
            </button>
            <button class="career">
                <p>Social Worker</p><br><p>$76,200.00/yr</p>
            </button>
        </section>
        <div class="bottom">
            <div class="selected-career">
            <p>Software Developer - $85,000.00/yr</p>
            </div>
            <button class="Continue">Continue to Tax Breakdown</button>
        </div>
    </main>
</body>
</html>
