<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>EECU Budget Calculator</title>
</head>
<body>
    <header>
        <nav id="nav-bar">
            <div id="Logo">
                <img src="Logo.png.png" alt="EECU Logo">
            </div>
            <ul id="nav-bar-ul">
                <div id="Logo">
                    <img src="Logo.png.png">
                </div>
                <li class="nav-bar-li">
                    <div class="progress">1 
                        <p>Choose Career</p>
                    </div>
                    <div class="progress">2
                        <P>Tax Breakdown</P>
                    </div>
                    <div class="progress">3
                        <P>Monthly Budget</P>
                    </div>
                    <div class="progress">4
                        <p>Results</p>
                    </div>

                </li>
            </ul>
        </nav>          
    </header>

    <main>
        <h1>Choose your career path</h1>
        <h2>Select a career to view salary data.</h2>
        <form id="search-bar">
            <input id="search-careers" type="text" placeholder="Search careers... (Nurse, Developer, Teacher)">
        </form>
        <section id="career-selection">
            <button class="career">
                <p>Software Developer<br>$85,000.00/yr</p>
            </button>
            <button class="career">
                <p>Biologist<br>$88,000.00/yr</p>
            </button>
            <button class="career">
                <p>Chemist<br>$58,808.00/yr</p>
            </button>
            <button class="career">
                <p>Lawyer<br>$93,000.00/yr</p>
            </button>
            <button class="career">
                <p>Nurse<br>$82,000.00/yr</p>
            </button>
            <button class="career">
                <p>Social Worker<br>$76,200.00/yr</p>
            </button>
        </section>
        <div class="selected-career">
            <p>Software Developer - $85,000.00/yr</p>
        </div>
        <button class="Continue">Continue to Tax Breakdown</button>
    </main>
</body>
</html>
